name: Nightly Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify GoReleaser Pro is configured
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
        run: |
          if [ -z "$GORELEASER_KEY" ]; then
            echo "Nightly releases require GoReleaser Pro."
            echo "Set the GORELEASER_KEY secret in the 'main' environment before running this workflow."
            exit 1
          fi

      - name: Set up GoReleaser Pro
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          install-only: true

      - name: Validate GoReleaser config
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
        run: goreleaser check --config .goreleaser.nightly.yml

      - name: Build and publish rolling nightly release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
          OTEL_TOKEN: ${{ secrets.OTEL_TOKEN }}
          OTEL_URL_PATH: ${{ secrets.OTEL_URL_PATH }}
        run: goreleaser release --config .goreleaser.nightly.yml --nightly --clean
