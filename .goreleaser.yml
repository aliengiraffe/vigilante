version: 2

project_name: vigilante

builds:
  - id: vigilante
    main: ./cmd/vigilante
    binary: vigilante
    env:
      - CGO_ENABLED=0
      - OTEL_ENDPOINT
      - OTEL_TOKEN
      - OTEL_URL_PATH
      - DISTRO
    ldflags:
      - -X github.com/nicobistolfi/vigilante/internal/build.Version={{ .Version }}
      - -X github.com/nicobistolfi/vigilante/internal/build.Distro={{ if index .Env "DISTRO" }}{{ .Env.DISTRO }}{{ else }}direct{{ end }}
      - -X github.com/nicobistolfi/vigilante/internal/build.TelemetryEndpoint={{ .Env.OTEL_ENDPOINT }}
      - -X github.com/nicobistolfi/vigilante/internal/build.TelemetryToken={{ .Env.OTEL_TOKEN }}
      - -X github.com/nicobistolfi/vigilante/internal/build.TelemetryURLPath={{ .Env.OTEL_URL_PATH }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

  - id: gh-sandbox
    main: ./cmd/gh-sandbox
    binary: gh-sandbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: release-archives
    ids:
      - vigilante
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- if eq .Os "darwin" }}macOS{{ else }}Linux{{ end }}_{{ .Arch }}

  - id: gh-sandbox-archives
    ids:
      - gh-sandbox
    formats:
      - tar.gz
    name_template: >-
      gh-sandbox_{{ .Version }}_Linux_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Env.NIGHTLY_VERSION }}"

release:
  github:
    owner: aliengiraffe
    name: vigilante

homebrew_casks:
  - name: vigilante
    ids:
      - release-archives
    repository:
      owner: aliengiraffe
      name: homebrew-spaceship
      token: "{{ .Env.HOMEBREW_GITHUB_API_TOKEN }}"
    homepage: "https://github.com/aliengiraffe/vigilante"
    description: "Autonomous GitHub issue runner for headless coding agents"
    license: "Apache-2.0"
    binaries:
      - vigilante

changelog:
  use: github-native
